name: Auto Process Contributions

on:
  pull_request:
    types:
      - opened

permissions:
  contents: write
  pull-requests: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update leaderboard
        run: node scripts/update-leaderboard.js "${{ github.actor }}" "${{ github.event.pull_request.number }}"

      - name: Commit leaderboard update
        run: |
          git checkout main
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add leaderboard.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard for PR #${{ github.event.pull_request.number }}"
          git push origin main

      - name: Comment on pull request
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "Thanks for contributing! You've been added to the leaderboard 🎉"
            });

      - name: Close pull request
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed"
            });
